<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tamil Vowels - Audio Reactive Learning</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <link rel="stylesheet" href="style.css">
    
    <script src="https://unpkg.com/lucide@latest"></script>

    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/speech-commands"></script>
</head>
<body class="bg-[#2b1810] text-amber-50 min-h-screen font-sans p-4 md:p-8 flex items-center justify-center">

    <div class="max-w-7xl w-full mx-auto flex flex-col lg:flex-row gap-8">
        
        <aside class="w-full lg:w-1/3 flex flex-col gap-6 items-center lg:items-start">
            
            <div id="saraswathi-card" class="w-full aspect-[4/5] rounded-2xl overflow-hidden border-2 border-[#5c3a21] bg-[#3d2314] card-transition relative shadow-lg">
                <img src="https://images.unsplash.com/photo-1590050752117-238cb0023ee0?auto=format&fit=crop&q=80&w=800" 
                     alt="Goddess Saraswathi" 
                     class="w-full h-full object-cover opacity-80" />
                <div class="absolute inset-0 bg-gradient-to-t from-[#2b1810] to-transparent opacity-60"></div>
                <h2 class="absolute bottom-4 left-0 right-0 text-center text-2xl font-semibold tracking-wider text-amber-200">
                    உயிர் எழுத்துகள்
                </h2>
            </div>

            <div class="w-full flex flex-col items-center gap-4 bg-[#3d2314] p-6 rounded-2xl border border-[#5c3a21]">
                <button id="mic-btn" class="w-20 h-20 rounded-full bg-[#5c3a21] flex items-center justify-center border-2 border-amber-600/50 hover:border-amber-400 transition-colors focus:outline-none">
                    <i data-lucide="mic" class="w-8 h-8 text-amber-400" id="mic-icon"></i>
                </button>
                <div class="text-center">
                    <p id="mic-status" class="text-amber-200 font-medium tracking-wide">Tap to start</p>
                    <p class="text-xs text-amber-400/60 mt-1">Say a Tamil vowel</p>
                </div>
            </div>

            <div class="w-full bg-[#3d2314] p-4 rounded-xl border border-[#5c3a21] text-center min-h-[5rem] flex flex-col justify-center">
                <p class="text-xs text-amber-500/70 uppercase tracking-widest font-semibold mb-1">Articulation Point</p>
                <p id="articulation-display" class="text-lg text-amber-100 font-medium">-</p>
            </div>
            
        </aside>

        <main class="w-full lg:w-2/3">
            <div id="vowel-grid" class="grid grid-cols-3 md:grid-cols-4 gap-4 h-full content-start">
                </div>
        </main>

    </div>

    <script src="app.js"></script>
</body>
</html>
