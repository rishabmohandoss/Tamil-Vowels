<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tamil Vowels - Audio Reactive Learning</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <link rel="stylesheet" href="style.css">
    
    <script src="https://unpkg.com/lucide@latest"></script>

    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/speech-commands"></script>
</head>
<body class="bg-[#2b1810] text-amber-50 min-h-screen font-sans p-4 md:p-8 flex items-center justify-center">

    <div class="max-w-7xl w-full mx-auto flex flex-col lg:flex-row gap-8 items-stretch">
        
        <aside class="w-full lg:w-1/3 flex flex-col gap-6 items-center">
            
            <div id="saraswathi-card" class="w-full aspect-[4/5] rounded-2xl overflow-hidden border-2 border-[#5c3a21] bg-[#3d2314] card-transition relative shadow-lg">
                <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/c/c5/Raja_Ravi_Varma_-_Goddess_Saraswati.jpg/640px-Raja_Ravi_Varma_-_Goddess_Saraswati.jpg" 
                     alt="Goddess Saraswathi" 
                     class="w-full h-full object-cover opacity-90" />
                <div class="absolute inset-0 bg-gradient-to-t from-[#2b1810] via-transparent to-transparent opacity-80"></div>
                <h2 class="absolute bottom-4 left-0 right-0 text-center text-2xl font-semibold tracking-wider text-amber-200 text-shadow">
                    உயிர் எழுத்துகள்
                </h2>
            </div>

            <div class="w-full flex flex-col items-center gap-4 bg-[#3d2314] p-6 rounded-2xl border border-[#5c3a21]">
                <button id="mic-btn" class="w-20 h-20 rounded-full bg-[#5c3a21] flex items-center justify-center border-2 border-amber-600/50 hover:border-amber-400 transition-colors focus:outline-none">
                    <i data-lucide="mic" class="w-8 h-8 text-amber-400" id="mic-icon"></i>
                </button>
                <div class="text-center">
                    <p id="mic-status" class="text-amber-200 font-medium tracking-wide">Tap to start</p>
                    <p class="text-xs text-amber-400/60 mt-1">Say a Tamil vowel clearly</p>
                </div>
            </div>
            
        </aside>

        <main class="w-full lg:w-2/3 flex flex-col justify-center">
            <div id="vowel-grid" class="grid grid-cols-3 md:grid-cols-4 gap-4 w-full">
                </div>
        </main>

    </div>

    <script src="app.js"></script>
</body>
</html>
